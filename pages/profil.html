<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Profil – High Five Swing</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <style>
    /* Profil specifikus stílusok */
    .profile-hero {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      padding: 40px 20px;
      border-radius: var(--radius-xl);
      text-align: center;
      margin-bottom: 32px;
      box-shadow: var(--shadow);
    }

    .profile-avatar {
      width: 100px;
      height: 100px;
      background: var(--hfs-red);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      font-weight: 900;
      margin: 0 auto 20px;
      box-shadow: 0 0 0 8px color-mix(in srgb, var(--hfs-red) 15%, transparent);
    }

    /* Versenyeredmények listája */
    .results-section h3 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      margin-bottom: 16px;
      font-weight: 800;
    }

    .results-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .result-item {
      background: var(--card-bg);
      padding: 16px 20px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: var(--shadow);
      transition: transform 0.2s ease;
    }

    .result-item:hover {
      transform: translateX(4px);
      border-color: var(--hfs-red);
    }

    .result-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .result-event {
      font-weight: 800;
      font-size: 1.05rem;
      color: var(--text-color);
    }

    .result-meta {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 600;
    }

    .result-place {
      background: var(--hfs-red);
      color: white;
      padding: 6px 14px;
      border-radius: 999px;
      font-weight: 900;
      font-size: 0.9rem;
      min-width: 80px;
      text-align: center;
    }

    #profileLoading {
      text-align: center;
      padding: 60px;
      font-weight: 700;
      color: var(--hfs-red);
    }
  </style>
</head>
<body class="profile-page">
  <header class="topbar">
    <div class="brand">High Five Swing</div>
    <nav class="nav">
      <a href="../index.html">Kezdőlap</a>
      <a href="./naptar.html">Naptár</a>
      <a class="active" href="./resztvevok.html">Résztvevők</a>
    </nav>
  </header>

  <div class="shell">
    <div class="layout">
      <aside class="sidebar">
        <div class="sidebar-head">
          <div class="sidebar-title">HFS 2026</div>
          <div class="sidebar-sub">Profil megtekintése</div>
        </div>

        <div class="sidebar-body">
          <div class="side-card">
            <h3>Navigáció</h3>
            <a class="side-link" href="./resztvevok.html" style="margin-top: 8px;">
              ← Vissza a listához
            </a>
          </div>

          <div class="side-card">
            <h3>Megjelenés</h3>
            <select id="themeSelector" class="month-select theme-select" style="width: 100%;">
              <option value="light">☀️ Világos</option>
              <option value="dark">🌙 Sötét</option>
              <option value="rainbow">🌈 Szivárvány</option>
            </select>
          </div>
        </div>
      </aside>

      <main class="container">
        <div id="profileLoading" class="card">
           <div class="sidebar-title">Adatok lekérése a Sheets-ből...</div>
        </div>

        <div id="profileContainer" style="display: none;">
          <section class="profile-hero">
            <div class="profile-avatar" id="profileInitials">?</div>
            <h1 id="profileName"></h1>
            <p class="muted" id="profileDivision"></p>
            
            <div class="wsdc-row" style="justify-content: center; margin-top: 15px; display: flex; align-items: center; gap: 10px;">
              <span id="profileWsdc"></span>
              <a id="profileScoringLink" href="#" target="_blank" class="wsdc-link" title="Scoring profil">➔</a>
            </div>
          </section>

          <section class="results-section">
            <h3>Versenyeredmények</h3>
            <div id="profileContent" class="results-list">
              </div>
          </section>
        </div>
      </main>
    </div>
  </div>

  <script type="module" src="../assets/js/main.js"></script>
</body>
</html>
