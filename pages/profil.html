<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Profil – High Five Swing</title>

  <link rel="stylesheet" href="../assets/css/style.css" />

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    .profile-hero {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
    }

    .profile-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--hfs-red);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 2rem;
      margin: 0 auto 12px;
    }

    .chart-tooltip {
      position: fixed; /* 🔥 fontos */
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      padding: 10px;
      border-radius: 10px;
      font-size: 0.8rem;
      pointer-events: none;
      opacity: 0;
      transform: translate(-50%, -120%);
      transition: 0.2s;
      z-index: 999;
      box-shadow: var(--shadow);
    }

    .chart-tooltip.active { opacity: 1; }

    .chart-tooltip .title {
      font-weight: 800;
      margin-bottom: 6px;
    }
  </style>
</head>

<body class="profile-page">

<header class="topbar">
  <div class="brand">High Five Swing</div>
</header>

<div class="shell">
  <main class="container">

    <div id="profileLoading">Betöltés...</div>

    <div id="profileContainer" style="display:none">

      <!-- ✅ PROFIL HEADER -->
      <section class="profile-hero">
        <div class="profile-avatar" id="profileInitials">?</div>
        <h1 id="profileName"></h1>
        <p id="profileDivision"></p>

        <div style="margin-top:10px;">
          <span id="profileWsdc"></span>
          <a id="profileScoringLink" target="_blank">➔</a>
        </div>
      </section>

      <!-- ✅ CHART -->
      <canvas id="pointsChart"></canvas>
      <div id="chartTooltip" class="chart-tooltip"></div>

      <!-- ✅ ESEMÉNYEK -->
      <div id="profileContent"></div>

    </div>
  </main>
</div>

<script type="module" src="../assets/js/main.js"></script>

</body>
</html>
