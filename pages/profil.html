<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Profil – High Five Swing</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <style>
    /* Profil Hero stílusok */
    .profile-hero {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      padding: 40px 20px;
      border-radius: var(--radius-xl);
      text-align: center;
      margin-bottom: 32px;
      box-shadow: var(--shadow);
    }

    .profile-avatar {
      width: 100px;
      height: 100px;
      background: var(--hfs-red);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      font-weight: 900;
      margin: 0 auto 20px;
      box-shadow: 0 0 0 8px color-mix(in srgb, var(--hfs-red) 15%, transparent);
    }

    /* Kétoszlopos elrendezés */
    .profile-main-grid {
      display: grid;
      grid-template-columns: 1.6fr 1fr;
      gap: 32px;
      align-items: start;
    }

    /* Harmonika (Accordion) stílusok */
    .event-accordion-item {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      margin-bottom: 12px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .event-header {
      padding: 16px 20px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.2s;
    }

    .event-header:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .event-main-data {
      display: flex;
      flex-direction: column;
    }

    .event-name {
      font-weight: 900;
      color: var(--text-color);
      font-size: 1.1rem;
    }

    .event-date {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .res-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 900;
      margin-left: 8px;
    }

    .res-badge.final { background: var(--hfs-red); color: white; }
    .res-badge.point { background: #2e7d32; color: white; }

    .event-body {
      max-height: 0;
      overflow: hidden;
      transition: all 0.3s ease-in-out;
      background: rgba(0, 0, 0, 0.1);
    }

    .event-body.active {
      max-height: 500px;
      padding: 20px;
      border-top: 1px solid var(--border-color);
    }

    .details-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .det label {
      display: block;
      font-size: 0.65rem;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 4px;
      font-weight: 700;
    }

    .det span {
      font-weight: 800;
      font-size: 1.1rem;
      color: var(--hfs-red);
    }

    .det.full {
      grid-column: span 2;
      border-top: 1px solid var(--border-color);
      padding-top: 12px;
    }

    /* Statisztika sorok (Jobb oldal) */
    .stat-mini-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border-color);
      font-size: 0.85rem;
    }

    .stat-row:last-child { border-bottom: none; }
    .stat-row .name { font-weight: 700; }
    .stat-row .val { color: var(--hfs-red); font-weight: 800; }

    #profileLoading {
      text-align: center;
      padding: 60px;
      font-weight: 700;
      color: var(--hfs-red);
    }

    @media (max-width: 1024px) {
      .profile-main-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body class="profile-page">
  <header class="topbar">
    <div class="brand">High Five Swing</div>
    <nav class="nav">
      <a href="../index.html">Kezdőlap</a>
      <a href="./naptar.html">Naptár</a>
      <a class="active" href="./resztvevok.html">Résztvevők</a>
    </nav>
  </header>

  <div class="shell">
    <div class="layout">
      <aside class="sidebar">
        <div class="sidebar-head">
          <div class="sidebar-title">HFS 2026</div>
          <div class="sidebar-sub">Profil megtekintése</div>
        </div>

        <div class="sidebar-body">
          <div class="side-card">
            <h3>Navigáció</h3>
            <a class="side-link" href="./resztvevok.html" style="margin-top: 8px;">
              ← Vissza a listához
            </a>
          </div>

          <div class="side-card">
            <h3>Megjelenés</h3>
            <select id="themeSelector" class="month-select theme-select" style="width: 100%;">
              <option value="light">☀️ Világos</option>
              <option value="dark">🌙 Sötét</option>
              <option value="rainbow">🌈 Szivárvány</option>
            </select>
          </div>
        </div>
      </aside>

      <main class="container">
        <div id="profileLoading" class="card">
           <div class="sidebar-title">Adatok lekérése a Sheets-ből...</div>
        </div>

        <div id="profileContainer" style="display: none;">
          <section class="profile-hero">
            <div class="profile-avatar" id="profileInitials">?</div>
            <h1 id="profileName"></h1>
            <p class="muted" id="profileDivision"></p>
            
            <div class="wsdc-row" style="justify-content: center; margin-top: 15px; display: flex; align-items: center; gap: 10px;">
              <span id="profileWsdc" style="font-weight: 800; opacity: 0.8;"></span>
              <a id="profileScoringLink" href="#" target="_blank" class="wsdc-link" title="Scoring profil">➔</a>
            </div>
          </section>

          <div class="profile-main-grid">
            
            <section class="results-section">
              <div class="sidebar-title" style="margin-bottom: 16px;">Események</div>
              <div id="profileContent" class="accordion-container">
                </div>
            </section>

            <aside class="stats-column">
              <div class="side-card">
                <h3>Legsikeresebb versenyek</h3>
                <div id="topEvents" class="stat-mini-list">
                  </div>
              </div>

              <div class="side-card" style="margin-top: 20px;">
                <h3>Legjobb partnerek</h3>
                <div id="topPartners" class="stat-mini-list">
                  </div>
              </div>
            </aside>

          </div>
        </div>
      </main>
    </div>
  </div>

  <script type="module" src="../assets/js/main.js?v=3"></script>
</body>
</html>
