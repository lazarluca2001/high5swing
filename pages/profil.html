<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Profil – High Five Swing</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body class="profile-page">
  <header class="topbar">
    <div class="brand">High Five Swing</div>
    <nav class="nav">
      <a href="../index.html">Kezdőlap</a>
      <a href="./naptar.html">Naptár</a>
      <a class="active" href="./resztvevok.html">Résztvevők</a>
    </nav>
  </header>

  <main class="shell">
    <div class="profile-actions" style="margin-bottom: 20px;">
      <a class="side-link" href="./resztvevok.html" style="display: inline-flex; width: auto; gap: 8px; align-items: center;">
        <span>←</span> Vissza a résztvevőkhöz
      </a>
    </div>

    <div id="profileLoading" class="card">
       <div class="sidebar-title">Adatok lekérése...</div>
    </div>

    <div id="profileContainer" style="display: none;">
      <section class="profile-hero">
        <div class="profile-avatar" id="profileInitials">?</div>
        <h1 id="profileName" style="font-size: 2.5rem; font-weight: 900; margin-bottom: 4px; letter-spacing: -1px;"></h1>
        <p class="muted" id="profileDivision" style="font-size: 1.1rem; font-weight: 600;"></p>
        
        <div class="wsdc-row" style="justify-content: center; margin-top: 15px; display: flex; align-items: center; gap: 10px;">
          <span id="profileWsdc" style="font-weight: 800; opacity: 0.8;"></span>
          <a id="profileScoringLink" href="#" target="_blank" class="wsdc-link" style="color: var(--hfs-red); font-size: 1.4rem;">➔</a>
        </div>
      </section>

      <div class="stats-grid">
        <div class="stat-card">
          <span class="stat-value" id="statPoints">-</span>
          <span class="stat-label">WSDC Pontok</span>
        </div>
        <div class="stat-card">
          <span class="stat-value" id="statEvents">-</span>
          <span class="stat-label">Regisztrált versenyek</span>
        </div>
      </div>

      <div id="profileContent" style="margin-top: 32px;">
        </div>
    </div>
  </main>

  <script type="module" src="../assets/js/main.js"></script>
</body>
</html>
