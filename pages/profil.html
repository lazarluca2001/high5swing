<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Profil – High Five Swing</title>

  <link rel="stylesheet" href="../assets/css/style.css" />

  <!-- ✅ Chart.js ide -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    .chart-tooltip {
      position: absolute;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      padding: 10px;
      border-radius: 10px;
      font-size: 0.8rem;
      pointer-events: none;
      opacity: 0;
      transform: translate(-50%, -120%);
      transition: 0.2s;
      z-index: 999;
      box-shadow: var(--shadow);
    }

    .chart-tooltip.active { opacity: 1; }

    .chart-tooltip .title {
      font-weight: 800;
      margin-bottom: 6px;
    }

    .chart-tooltip .row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }
  </style>
</head>

<body class="profile-page">

<header class="topbar">
  <div class="brand">High Five Swing</div>
</header>

<div class="shell">
  <main class="container">

    <div id="profileLoading">Betöltés...</div>

    <div id="profileContainer" style="display:none">

      <h1 id="profileName"></h1>

      <!-- ✅ CHART -->
      <canvas id="pointsChart" height="120"></canvas>
      <div id="chartTooltip" class="chart-tooltip"></div>

      <div id="profileContent"></div>

    </div>
  </main>
</div>

<script type="module" src="../assets/js/main.js"></script>

</body>
</html>
