<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Profil – High Five Swing</title>

  <link rel="stylesheet" href="../assets/css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    .profile-hero {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      padding: 30px;
      border-radius: var(--radius-xl);
      text-align: center;
      box-shadow: var(--shadow);
    }

    .profile-avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: var(--hfs-red);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 2.2rem;
      margin: 0 auto 12px;
    }

    .profile-meta {
      margin-top: 8px;
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .profile-meta a {
      margin-left: 8px;
      text-decoration: none;
      font-weight: bold;
      color: var(--hfs-red);
    }

    .chart-card {
      margin-top: 20px;
    }

    .events-card {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<header class="topbar">
  <div class="brand">High Five Swing</div>
  <nav class="nav">
    <a href="../index.html">Kezdőlap</a>
    <a href="./naptar.html">Naptár</a>
    <a href="./resztvevok.html">Résztvevők</a>
  </nav>
</header>

<div class="shell">
  <div class="layout">

    <!-- ✅ SIDEBAR -->
    <aside class="sidebar">
      <div class="side-card">
        <h3>Profil</h3>
        <p class="muted">Táncos statisztikák</p>
      </div>

      <div class="side-card">
        <h3>Megjelenés</h3>
        <select id="themeSelector" style="width:100%">
          <option value="light">☀️ Világos</option>
          <option value="dark">🌙 Sötét</option>
          <option value="rainbow">🌈 Szivárvány</option>
        </select>
      </div>
    </aside>

    <!-- ✅ MAIN -->
    <main class="container">

      <div id="profileLoading" class="card">Betöltés...</div>

      <div id="profileContainer" style="display:none">

        <!-- HERO -->
        <section class="profile-hero">
          <div class="profile-avatar" id="profileInitials">?</div>
          <h1 id="profileName"></h1>
          <div class="profile-meta">
            <span id="profileDivision"></span> • 
            <span id="profileWsdc"></span>
            <a id="profileScoringLink" target="_blank">WSDC</a>
          </div>
        </section>

        <!-- CHART -->
        <div class="card chart-card">
          <canvas id="pointsChart"></canvas>
        </div>

        <!-- EVENTS -->
        <div class="card events-card">
          <div id="profileContent"></div>
        </div>

      </div>

    </main>
  </div>
</div>

<script type="module" src="../assets/js/main.js"></script>

</body>
</html>
