<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Résztvevők – High Five Swing</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <style>
    /* Kártya és gomb stílusok a dinamikus tartalomhoz */
    .member-card {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 100%;
    }

    .wsdc-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
      font-weight: 700;
    }

    .wsdc-link {
      color: var(--hfs-red);
      text-decoration: none;
      font-size: 1.2rem;
      transition: transform 0.2s;
    }

    .wsdc-link:hover {
      transform: translateX(3px);
    }

    .card-footer {
      margin-top: 20px;
      border-top: 1px solid var(--border-color);
      padding-top: 15px;
    }

    .profile-button {
      display: block;
      width: 100%;
      padding: 10px;
      background: var(--hfs-light-red);
      color: var(--hfs-red);
      text-align: center;
      text-decoration: none;
      border-radius: var(--radius-md);
      font-weight: 800;
      font-size: 0.85rem;
      letter-spacing: 0.5px;
      transition: all 0.2s;
    }

    .profile-button:hover {
      background: var(--hfs-red);
      color: white;
    }

    /* Szivárvány téma kompatibilitás */
    [data-theme="rainbow"] .profile-button:hover {
      background: linear-gradient(90deg, var(--rainbow-red), var(--rainbow-orange));
      border-color: transparent;
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">High Five Swing</div>
    <nav class="nav">
      <a href="../index.html">Kezdőlap</a>
      <a href="./naptar.html">Naptár</a>
      <a class="active" href="./resztvevok.html">Résztvevők</a>
    </nav>
  </header>

  <div class="shell">
    <div class="layout">
      <aside class="sidebar">
        <div class="sidebar-head">
          <div class="sidebar-title">HFS 2026</div>
          <div class="sidebar-sub">Community dashboard</div>
        </div>

        <div class="sidebar-body">
          <div class="side-card">
            <h3>Következő állomás</h3>
            <div id="nextEventContent" class="next-event-content">Betöltés...</div>
          </div>

          <div class="side-card">
            <h3>Megjelenés</h3>
            <select id="themeSelector" class="month-select theme-select" style="width: 100%;">
              <option value="light">☀️ Világos</option>
              <option value="dark">🌙 Sötét</option>
              <option value="rainbow">🌈 Szivárvány</option>
            </select>
          </div>
        </div>
      </aside>

      <main class="container">
        <section class="page-hero">
          <h1>Résztvevők</h1>
          <p class="muted">Közösségünk aktív táncosai Google Sheets adatok alapján.</p>

          <div class="block" style="margin-top:14px;">
            <div class="tiny muted" style="margin-bottom:8px; font-weight:700; letter-spacing:.6px; text-transform:uppercase;">
              Tagok szűrése
            </div>
            <div id="memberSelector" class="member-selector"></div>
          </div>
        </section>

        <div id="participants" class="cards"></div>
      </main>
    </div>
  </div>

  <script type="module" src="../assets/js/main.js"></script>
</body>
</html>
